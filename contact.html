<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }
        #header{
            width: 100vw;
            height: 10vh;
            background-color: rgb(92, 89, 89);
            display: flex;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #title{
            text-decoration: underline;
            margin-left: 100px;
        }
        header > h1{
            font-size: 34px;
            padding-left: 50px;
        }
        .link{
            text-decoration: none;
            font-size: 20px;
            display: flex;
            list-style: none;
        }
        .links{
            color: white;
            margin-left: 20px;
            padding-right: 60px;
            text-decoration: none;
            padding-bottom: 30px;
            padding-top: 30px;
        }
        .links:hover{
            color: rgb(198, 198, 198);
            background: linear-gradient(to bottom, rgb(92, 89, 89), rgb(234, 234, 234));
            color: black;
            text-shadow: 2px 1px grey;
        }
        #container{
            height: 83vh;
            display: flex;
            background-color: rgb(234, 234, 234);
            justify-content: space-around;
            padding-top: 75px;
        }

        #contactInfo{
            box-shadow: 0px 5px 10px rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            height: 60vh;
            width: 40vw;
            background-color: white;
            padding: 30px 40px;
        }

        #contactInfo > p{
            padding-top: 25px;
            font-size: 20px;
        }

        #githubLink{
            padding-bottom: 15px;
        }

        #information{
            border-radius: 10px;
            width: 40vw;
            height: 60vh;
            background-color: white;
            box-shadow: 0px 5px 10px rgba(0, 0, 0, 0.3);
            padding: 20px 40px;
        }

        .labelText{
            font-size: 20px;

        }

        label > input, textarea{
            margin-top: 5px;
            margin-bottom: 5px;
            width: 100%;
            height: 30px;
            border-radius: 10px;
            border: none;
            box-shadow: inset 0px 0px 5px rgba(0, 0, 0, 0.3);
            padding-left: 10px;
        }
        
        #information > h2{
            text-align: center;
        }

        textarea{
            height: 150px;
            resize: none;
            padding: 10px;
        }

        #button{
            height: 40px;
            width: 100%;
            border: none;
            background-color: rgb(227, 227, 227);
            border-radius: 5px;
            margin-top: 10px;
        }

        #button:hover{
            box-shadow: 0px 2px 5px rgba(0, 0, 0, 0.3);
            cursor: pointer;
        }

        #button:active{
            box-shadow: inset 0px 0px 5px rgba(0, 0, 0, 0.3);
        }


        #footer{
            background-color: rgb(92, 89, 89);
            color: white;
            text-align: center;
            height: 7vh;
            width: 100vw;
            align-content: center;
        }
    </style>
</head>
<body>
    <header id="header">
        <h1><img src="" alt="" />Brenden Ogle</h1>
        <h1 id="title">Contact Page</h1>
        <ul class="link">
            <li><a class="links" href="index.html">Home</a></li>
            <li><a class="links" href="projects.html">Projects</a></li>
            <li><a class="links" href="https://docs.google.com/document/d/1ekupCQdSh3nCHrsIK2ftJ8PADRoZd_-H7ojuVHjpnDY/edit?tab=t.0">Resume</a></li>
        </ul>
    </header>

    <div id="container">
        <div id="contactInfo">
            <h2>Contact Information</h2>
            <p><strong>Email:</strong> bogle807@west-mec.org</p>
            <p><strong>Phone:</strong> (480)-235-3458</p>
            <p><strong>Location:</strong> Surprise, AZ</p>
            <p id="githubLink"><strong>GitHub:</strong> <a href="https://github.com/BrendenOgle" target="_blank">My GitHub</a></p>
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3325.6709253397526!2d-112.29541422403611!3d33.53594047335587!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x872b4104080e38d9%3A0x1fbd2919e78fa444!2sWest-MEC%20-%20Central%20Campus!5e0!3m2!1sen!2sus!4v1766016970594!5m2!1sen!2sus" 
            width="525" 
            height="200" 
            style="border:0;" 
            allowfullscreen="" 
            loading="lazy" 
            referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>

        <div id="information">
            <h2 id="message">Send Me a Message</h2>
            <form id="form">
                <label>
                    <span class="labelText">Name</span>
                    <br>
                    <input type="text" name="name" placeholder="Your Name" required/>
                </label>
                <br>
                <label>
                    <span class="labelText">Email</span>
                    <br>
                    <input type="email"  name="email" placeholder="example@gmail.com" required />
                </label>
                <br>
                <label>
                    <span class="labelText">Subject</span>
                    <br>
                    <input type="text" name="subject" placeholder="Brief subject" />
                </label>
                <br>
                <label>
                    <span class="labelText">Message</span>
                    <br>
                    <textarea name="message" rows="6" placeholder="Your Message" ></textarea>
                </label>
                <br>

                <button id="button" type="submit">Send Message</button>
            </form>
        </div>

    </div>




    <footer id="footer">&copy; 2025 Brenden Ogle. All rights reserved.</footer>
</body>
</html>
